<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - Dashboard TI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  html, body { height:100%; }
  body {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.15), transparent 32%),
      radial-gradient(circle at 80% 20%, rgba(251,63,58,0.22), transparent 24%),
      linear-gradient(135deg,#031926 0%,#073954 42%,#0b2e47 100%);
    background-size: 140% 140%;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:bgMove 16s ease-in-out infinite alternate;
  }
  body::before,
  body::after {
    content:"";
    position:absolute;
    inset:auto;
    border-radius:50%;
    filter: blur(10px);
    opacity:0.5;
    pointer-events:none;
  }
  body::before {
    width:420px;
    height:420px;
    top:-120px;
    left:-90px;
    background:radial-gradient(circle, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 55%, transparent 72%);
    animation:floatOrb 18s ease-in-out infinite;
  }
  body::after {
    width:360px;
    height:360px;
    right:-80px;
    bottom:-120px;
    background:radial-gradient(circle, rgba(251,63,58,0.22) 0%, rgba(251,63,58,0.06) 52%, transparent 72%);
    animation:floatOrb 22s ease-in-out infinite reverse;
  }
  .background-grid {
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 54px 54px;
    mask-image: radial-gradient(circle at center, rgba(0,0,0,0.85), transparent 88%);
    opacity:0.34;
    animation:gridDrift 22s linear infinite;
    pointer-events:none;
  }
  .background-glow {
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }
  .background-glow span {
    position:absolute;
    display:block;
    border-radius:999px;
    background:linear-gradient(135deg, rgba(255,255,255,0.28), rgba(255,255,255,0.02));
    box-shadow:0 0 40px rgba(255,255,255,0.08);
    animation:floatParticle linear infinite;
  }
  .background-glow span:nth-child(1) { width:160px; height:160px; left:8%; top:18%; animation-duration:20s; }
  .background-glow span:nth-child(2) { width:22px; height:22px; left:22%; top:72%; animation-duration:15s; animation-delay:-4s; }
  .background-glow span:nth-child(3) { width:120px; height:120px; left:75%; top:14%; animation-duration:18s; animation-delay:-6s; }
  .background-glow span:nth-child(4) { width:28px; height:28px; left:84%; top:62%; animation-duration:13s; animation-delay:-2s; }
  .background-glow span:nth-child(5) { width:76px; height:76px; left:58%; top:78%; animation-duration:17s; animation-delay:-8s; }
  .background-glow span:nth-child(6) { width:14px; height:14px; left:42%; top:22%; animation-duration:11s; animation-delay:-5s; }
  .page-shell {
    position: relative;
    z-index: 1;
    width: min(1240px, calc(100% - 48px));
    display: grid;
    grid-template-columns: minmax(0, 1.45fr) minmax(340px, 390px);
    gap: 24px;
    align-items: center;
  }
  .showcase-panel {
    position: relative;
    overflow: hidden;
    border-radius: 30px;
    padding: 28px 30px;
    background:
      linear-gradient(150deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04)),
      linear-gradient(135deg, rgba(3,25,38,0.92), rgba(7,57,84,0.88));
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: 0 26px 70px rgba(3,25,38,0.32);
    color: #fff;
    display: flex;
    align-items: center;
    min-height: 520px;
  }
  .showcase-panel::before {
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.16), transparent 22%),
      radial-gradient(circle at 82% 14%, rgba(251,63,58,0.26), transparent 18%),
      linear-gradient(120deg, transparent 0 32%, rgba(255,255,255,0.05) 32% 35%, transparent 35% 100%);
    pointer-events:none;
  }
  .brand-ribbon {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .brand-ribbon {
    display: grid;
    gap: 16px;
  }
  .brand-ribbon-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 6px;
  }
  .brand-ribbon-header strong {
    font-size: 1.08rem;
  }
  .brand-ribbon-header span {
    color: rgba(255,255,255,0.72);
    font-size: 0.9rem;
  }
  .brand-track {
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  }
  .brand-row {
    display: flex;
    width: max-content;
    gap: 16px;
    animation: marquee 26s linear infinite;
  }
  .brand-row.reverse { animation-direction: reverse; animation-duration: 30s; }
  .brand-chip {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 156px;
    height: 88px;
    padding: 14px 22px;
    border-radius: 22px;
    background: rgba(255,255,255,0.96);
    box-shadow: 0 10px 24px rgba(3,25,38,0.18);
  }
  .brand-chip img {
    max-width: 100%;
    max-height: 42px;
    object-fit: contain;
  }
  .login-container {
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.92);
    backdrop-filter: blur(14px);
    color:#073954;
    padding:40px 50px;
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.45);
    box-shadow:0 22px 60px rgba(7,57,84,0.32);
    width:360px;
    text-align:center;
    animation:fadeIn 0.8s ease;
  }
  .login-container::before {
    content:"";
    position:absolute;
    inset:10px;
    border-radius:18px;
    border:1px solid rgba(7,57,84,0.08);
    pointer-events:none;
  }
  .login-head {
    display: grid;
    gap: 10px;
    margin-bottom: 24px;
  }
  .login-caption {
    color: #6c8291;
    font-size: 0.92rem;
    line-height: 1.5;
  }
  @keyframes bgMove { 0% {background-position:0% 50%;} 100% {background-position:100% 50%;} }
  @keyframes gridDrift { from { transform:translate3d(0,0,0); } to { transform:translate3d(-54px,-54px,0); } }
  @keyframes floatOrb {
    0%, 100% { transform:translate3d(0,0,0) scale(1); }
    50% { transform:translate3d(30px,24px,0) scale(1.08); }
  }
  @keyframes floatParticle {
    0% { transform:translate3d(0,0,0) scale(0.92); opacity:0.18; }
    50% { transform:translate3d(16px,-28px,0) scale(1.05); opacity:0.38; }
    100% { transform:translate3d(-10px,-56px,0) scale(0.96); opacity:0.12; }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  @keyframes fadeIn { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }
  .login-container h2 { margin-bottom:25px; font-weight:700; font-size:2rem; }
  .input-group { margin-bottom:20px; position:relative; text-align:left; }
  .input-group i { position:absolute; top:50%; left:12px; transform:translateY(-50%); color:#888; font-size:1.1rem; }
  input { width:100%; padding:12px 15px 12px 40px; border-radius:12px; border:2px solid #d8e0e7; font-size:1rem; transition:0.3s; background:rgba(255,255,255,0.92); }
  input:focus { border-color:#fb3f3a; outline:none; box-shadow:0 0 8px rgba(251,63,58,0.5); }
  input.error { border-color:#ff4f4f; box-shadow:0 0 6px rgba(255,79,79,0.6); }
  button { background:linear-gradient(45deg,#fb3f3a,#d73731); border:none; color:white; font-size:1.1rem; font-weight:700; padding:14px 0; width:100%; border-radius:10px; cursor:pointer; box-shadow:0 6px 18px rgba(251,63,58,0.5); transition:0.3s ease; margin-top:5px; }
  button:hover:not(:disabled) { background:linear-gradient(45deg,#d73731,#fb3f3a); transform:translateY(-2px); box-shadow:0 8px 22px rgba(215,55,49,0.7); }
  button:disabled { background:gray; cursor:not-allowed; box-shadow:none; }
  .msg { position:absolute; top:-35px; left:50%; transform:translateX(-50%); padding:10px 18px; border-radius:6px; font-weight:600; font-size:0.9rem; display:none; color:white; box-shadow:0 3px 10px rgba(0,0,0,0.3); }
  .error-msg { background:#ff4f4f; }
  .success-msg { background:#28a745; }
  .logo { display:block; margin:0 auto 25px auto; max-width:180px; height:auto; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
  @media(max-width:960px){
    body {
      overflow-y: auto;
      padding: 26px 0;
      align-items: flex-start;
    }
    .page-shell {
      grid-template-columns: 1fr;
      width: min(720px, calc(100% - 28px));
    }
    .showcase-panel {
      min-height: auto;
      padding: 26px 22px;
    }
    .login-container {
      width: 100%;
    }
  }
  @media(max-width:640px){
    body::before { width:260px; height:260px; top:-90px; left:-120px; }
    body::after { width:220px; height:220px; right:-90px; bottom:-90px; }
    .background-grid { opacity:0.22; background-size:36px 36px; }
    .page-shell {
      width: min(100%, calc(100% - 20px));
      gap: 18px;
    }
    .showcase-panel {
      padding: 22px 18px;
      border-radius: 24px;
    }
    .brand-chip {
      min-width: 126px;
      height: 72px;
      padding: 10px 16px;
    }
    .brand-chip img {
      max-height: 34px;
    }
    .login-head {
      margin-bottom: 20px;
    }
  }
  @media(max-width:400px){ .login-container{width:90%; padding:30px 20px;} .login-container h2{font-size:1.8rem;} }
</style>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="background-grid" aria-hidden="true"></div>
  <div class="background-glow" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>
  <div class="page-shell">
    <section class="showcase-panel" aria-label="Apresentacao institucional DC">
      <div class="brand-ribbon" aria-label="Marcas em destaque">
        <div class="brand-ribbon-header">
        </div>
        <div class="brand-track">
          <div class="brand-row">
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/79-condor.png" alt="Condor" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/49-baby-soft.png" alt="Baby Soft" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/26-repelex.png" alt="Repelex" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/62-docile.png" alt="Docile" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/60-elgin.png" alt="Elgin" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/79-condor.png" alt="Condor" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/49-baby-soft.png" alt="Baby Soft" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/26-repelex.png" alt="Repelex" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/62-docile.png" alt="Docile" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/60-elgin.png" alt="Elgin" /></div>
          </div>
        </div>
        <div class="brand-track">
          <div class="brand-row reverse">
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/10-guabi-natural.png" alt="Guabi Natural" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/32-gran-plus.png" alt="Gran Plus" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/43-primogato.png" alt="PrimoGato" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/46-three-dogs.png" alt="Three Dogs" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/47-atila.png" alt="Atila" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/10-guabi-natural.png" alt="Guabi Natural" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/32-gran-plus.png" alt="Gran Plus" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/43-primogato.png" alt="PrimoGato" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/46-three-dogs.png" alt="Three Dogs" /></div>
            <div class="brand-chip"><img src="https://www.distribuidoradc.com.br/img/marcas/47-atila.png" alt="Atila" /></div>
          </div>
        </div>
      </div>
    </section>

    <div class="login-container">
      <div class="msg error-msg" id="errorMsg"></div>
      <div class="msg success-msg" id="successMsg"></div>
      <img src="logo.png" alt="Logo da Empresa" class="logo" />
      <div class="login-head">
        <h2>Login - Gastos TI</h2>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="off" />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="off" />
      </div>
      <button onclick="fazerLogin()" id="btnLogin">Entrar</button>
    </div>
  </div>

<script>
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const btnLogin = document.getElementById('btnLogin');
  const inputUsuario = document.getElementById('usuario');
  const inputSenha = document.getElementById('senha');

  function mostrarErro(msg){
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
  }

  function mostrarSucesso(msg){
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
    errorMsg.style.display = 'none';
  }

  function limparMensagens(){
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    inputUsuario.classList.remove('error');
    inputSenha.classList.remove('error');
  }

  function fazerLogin(){
    limparMensagens();
    const usuario = inputUsuario.value.trim().toLowerCase();
    const senha = inputSenha.value.trim();

    if(!usuario || !senha){
      mostrarErro("Preencha usuário e senha.");
      if(!usuario) inputUsuario.classList.add('error');
      if(!senha) inputSenha.classList.add('error');
      return;
    }

    btnLogin.textContent = "Entrando...";
    btnLogin.disabled = true;

    setTimeout(() => {
      const usuariosFixos = {
        lauro: 'DC@dist99',
        marco: 'DC@dist99',
        natan: 'DC@dist99',
        luis: 'DC@dist99',
        cesar: 'DC@dist99',
        thiago: 'Dcondor99'
      };

      if(usuariosFixos[usuario] && usuariosFixos[usuario] === senha){
        sessionStorage.setItem('portalUsuarioLogado', usuario);
        mostrarSucesso(`Bem-vindo, ${usuario}!`);
        setTimeout(() => {
          window.location.href = 'portal.html';
        }, 1200);
      } else {
        mostrarErro("Usuário ou senha incorretos.");
        btnLogin.textContent = "Entrar";
        btnLogin.disabled = false;
        inputUsuario.classList.add('error');
        inputSenha.classList.add('error');
      }
    }, 600);
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      fazerLogin();
    }
  });
</script>
</body>
</html>
