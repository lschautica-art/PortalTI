<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - Dashboard TI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body, html { height:100%; background:linear-gradient(135deg,#073954,#0b2e47); display:flex; justify-content:center; align-items:center; animation:bgMove 10s infinite alternate ease-in-out; }
  @keyframes bgMove { 0% {background-position:0% 50%;} 100% {background-position:100% 50%;} }
  .login-container { background:#fff; color:#073954; padding:40px 50px; border-radius:15px; box-shadow:0 12px 35px rgba(7,57,84,0.4); width:360px; text-align:center; animation:fadeIn 0.8s ease; position:relative; }
  @keyframes fadeIn { from {opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }
  .login-container h2 { margin-bottom:25px; font-weight:700; font-size:2rem; }
  .input-group { margin-bottom:20px; position:relative; text-align:left; }
  .input-group i { position:absolute; top:50%; left:12px; transform:translateY(-50%); color:#888; font-size:1.1rem; }
  input { width:100%; padding:12px 15px 12px 40px; border-radius:8px; border:2px solid #ddd; font-size:1rem; transition:0.3s; }
  input:focus { border-color:#fb3f3a; outline:none; box-shadow:0 0 8px rgba(251,63,58,0.5); }
  input.error { border-color:#ff4f4f; box-shadow:0 0 6px rgba(255,79,79,0.6); }
  button { background:linear-gradient(45deg,#fb3f3a,#d73731); border:none; color:white; font-size:1.1rem; font-weight:700; padding:14px 0; width:100%; border-radius:10px; cursor:pointer; box-shadow:0 6px 18px rgba(251,63,58,0.5); transition:0.3s ease; margin-top:5px; }
  button:hover:not(:disabled) { background:linear-gradient(45deg,#d73731,#fb3f3a); transform:translateY(-2px); box-shadow:0 8px 22px rgba(215,55,49,0.7); }
  button:disabled { background:gray; cursor:not-allowed; box-shadow:none; }
  .btn-secundario {
    background:linear-gradient(45deg,#073954,#0b2e47);
    box-shadow:0 6px 18px rgba(7,57,84,0.35);
  }
  .btn-secundario:hover:not(:disabled) {
    background:linear-gradient(45deg,#0b2e47,#073954);
    box-shadow:0 8px 22px rgba(7,57,84,0.5);
  }
  .msg { position:absolute; top:-35px; left:50%; transform:translateX(-50%); padding:10px 18px; border-radius:6px; font-weight:600; font-size:0.9rem; display:none; color:white; box-shadow:0 3px 10px rgba(0,0,0,0.3); }
  .error-msg { background:#ff4f4f; }
  .success-msg { background:#28a745; }
  .logo { display:block; margin:0 auto 25px auto; max-width:180px; height:auto; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
  @media(max-width:400px){ .login-container{width:90%; padding:30px 20px;} .login-container h2{font-size:1.8rem;} }
</style>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-container">
    <div class="msg error-msg" id="errorMsg"></div>
    <div class="msg success-msg" id="successMsg"></div>
    <img src="logo.png" alt="Logo da Empresa" class="logo" />
    <h2>Login - Gastos TI</h2>

    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="email" id="usuario" placeholder="Digite seu e-mail" autocomplete="off" />
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="off" />
    </div>

    <button onclick="fazerLogin()" id="btnLogin">Entrar</button>
    <button onclick="criarConta()" id="btnCadastro" class="btn-secundario">Criar conta</button>
  </div>

<script>
  const supabase = window.supabase.createClient(
    "https://nfbcjunuanwjsciajifg.supabase.co",
    "sb_publishable_fFiZCvpwkFgcOLob6SVQ7Q_6yJqiDqz"
  );

  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const btnLogin = document.getElementById('btnLogin');
  const btnCadastro = document.getElementById('btnCadastro');
  const inputUsuario = document.getElementById('usuario');
  const inputSenha = document.getElementById('senha');

  function mostrarErro(msg){
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
  }

  function mostrarSucesso(msg){
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
    errorMsg.style.display = 'none';
  }

  function limparMensagens(){
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    inputUsuario.classList.remove('error');
    inputSenha.classList.remove('error');
  }

  function setBotoesCarregando(carregando, textoLogin = "Entrar", textoCadastro = "Criar conta"){
    btnLogin.disabled = carregando;
    btnCadastro.disabled = carregando;
    btnLogin.textContent = textoLogin;
    btnCadastro.textContent = textoCadastro;
  }

  async function fazerLogin(){
    limparMensagens();

    const email = inputUsuario.value.trim();
    const senha = inputSenha.value.trim();

    if(!email || !senha){
      mostrarErro("Preencha e-mail e senha.");
      if(!email) inputUsuario.classList.add('error');
      if(!senha) inputSenha.classList.add('error');
      return;
    }

    setBotoesCarregando(true, "Entrando...", "Criar conta");

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if(error){
      mostrarErro("E-mail ou senha incorretos.");
      inputUsuario.classList.add('error');
      inputSenha.classList.add('error');
      setBotoesCarregando(false);
      return;
    }

    if(data.user){
      mostrarSucesso("Login realizado com sucesso!");
      setTimeout(() => {
        window.location.href = 'portal.html';
      }, 1200);
    } else {
      mostrarErro("Não foi possível entrar.");
      setBotoesCarregando(false);
    }
  }

  async function criarConta(){
    limparMensagens();

    const email = inputUsuario.value.trim();
    const senha = inputSenha.value.trim();

    if(!email || !senha){
      mostrarErro("Preencha e-mail e senha para criar a conta.");
      if(!email) inputUsuario.classList.add('error');
      if(!senha) inputSenha.classList.add('error');
      return;
    }

    if(senha.length < 6){
      mostrarErro("A senha deve ter pelo menos 6 caracteres.");
      inputSenha.classList.add('error');
      return;
    }

    setBotoesCarregando(true, "Entrar", "Criando...");

    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: senha
    });

    if(error){
      mostrarErro(error.message);
      setBotoesCarregando(false);
      return;
    }

    mostrarSucesso("Conta criada com sucesso! Agora faça o login.");
    setBotoesCarregando(false);
  }

  async function verificarSessao(){
    const { data } = await supabase.auth.getSession();

    if(data.session){
      window.location.href = 'portal.html';
    }
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      fazerLogin();
    }
  });

  verificarSessao();
</script>
</body>
</html>
